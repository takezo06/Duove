services:
  postgres:
    image: postgres:15-alpine
    container_name: duove-postgres
    environment:
      POSTGRES_USER: duove_user
      POSTGRES_PASSWORD: duove_password
      POSTGRES_DB: duove_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql  # Auto-run schema on first start
    restart: unless-stopped

  app:
    build: .
    container_name: duove-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://duove_user:duove_password@postgres:5432/duove_db
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
    volumes:
      - .:/app                  # Mount entire project
      - /app/node_modules       # Keep container's node_modules (avoids overwriting)
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
